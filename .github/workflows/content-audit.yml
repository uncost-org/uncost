name: content-audit
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - run: python3 scripts/audit_repository.py
      - run: python3 scripts/audit_website.py --selftest
      - run: python3 scripts/audit_website.py
      - uses: actions/setup-node@v4
        with:
          node-version-file: website/.nvmrc
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
        working-directory: website
      - run: npm run build
        working-directory: website
      - run: python3 scripts/audit_website.py --built website/dist
      - name: HTML validity and heading order
        run: npx html-validate "dist/**/*.html"
        working-directory: website
      - name: Internal links, anchors, and zero third-party requests
        run: python3 scripts/audit_site_quality.py website/dist
