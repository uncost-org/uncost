name: Documentation correction
description: Report a source, wording, link, or consistency problem
title: "[Docs]: "
labels: [documentation]
body:
  - type: textarea
    id: location
    attributes:
      label: File and section
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or unclear?
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source or evidence
  - type: checkboxes
    id: privacy
    attributes:
      label: Safety
      options:
        - label: I have not included secrets, personal data, or private source material.
          required: true
